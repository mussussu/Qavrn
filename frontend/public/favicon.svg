<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <clipPath id="c">
      <circle cx="27" cy="26" r="20"/>
    </clipPath>
  </defs>

  <!-- Handle -->
  <line x1="42" y1="41" x2="58" y2="57"
        stroke="url(#g)" stroke-width="5" stroke-linecap="round"/>

  <!-- Lens background -->
  <circle cx="27" cy="26" r="20" fill="#06101f"/>

  <!-- Inner content -->
  <g clip-path="url(#c)">
    <!-- Neural network connections -->
    <g stroke="url(#g)" stroke-opacity="0.48" stroke-width="1">
      <line x1="16" y1="22" x2="27" y2="16"/>
      <line x1="16" y1="22" x2="27" y2="26"/>
      <line x1="16" y1="22" x2="27" y2="36"/>
      <line x1="16" y1="31" x2="27" y2="16"/>
      <line x1="16" y1="31" x2="27" y2="26"/>
      <line x1="16" y1="31" x2="27" y2="36"/>
      <line x1="27" y1="16" x2="38" y2="22"/>
      <line x1="27" y1="26" x2="38" y2="22"/>
      <line x1="27" y1="36" x2="38" y2="22"/>
      <line x1="27" y1="16" x2="38" y2="31"/>
      <line x1="27" y1="26" x2="38" y2="31"/>
      <line x1="27" y1="36" x2="38" y2="31"/>
    </g>
    <!-- Node glows -->
    <g fill-opacity="0.2">
      <circle cx="16" cy="22" r="5"  fill="#3B82F6"/>
      <circle cx="16" cy="31" r="5"  fill="#3B82F6"/>
      <circle cx="27" cy="16" r="5"  fill="#3B82F6"/>
      <circle cx="27" cy="26" r="6"  fill="#1d8cf0"/>
      <circle cx="27" cy="36" r="5"  fill="#06B6D4"/>
      <circle cx="38" cy="22" r="5"  fill="#06B6D4"/>
      <circle cx="38" cy="31" r="5"  fill="#06B6D4"/>
    </g>
    <!-- Node cores -->
    <g fill="url(#g)">
      <circle cx="16" cy="22" r="2.5"/>
      <circle cx="16" cy="31" r="2.5"/>
      <circle cx="27" cy="16" r="2.5"/>
      <circle cx="27" cy="26" r="3"/>
      <circle cx="27" cy="36" r="2.5"/>
      <circle cx="38" cy="22" r="2.5"/>
      <circle cx="38" cy="31" r="2.5"/>
    </g>
  </g>

  <!-- Lens ring -->
  <circle cx="27" cy="26" r="20" stroke="url(#g)" stroke-width="3"/>

  <!-- Highlight arc -->
  <path d="M 12 20 A 20 20 0 0 1 32 7"
        stroke="white" stroke-opacity="0.13" stroke-width="1.5" stroke-linecap="round"/>
</svg>
