<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="gradHandle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <clipPath id="lensClip">
      <circle cx="105" cy="98" r="70"/>
    </clipPath>
  </defs>

  <!-- Handle -->
  <line x1="160" y1="153" x2="213" y2="206"
        stroke="url(#gradHandle)" stroke-width="13" stroke-linecap="round"/>

  <!-- Lens background -->
  <circle cx="105" cy="98" r="70" fill="#06101f"/>

  <!-- Content clipped inside lens -->
  <g clip-path="url(#lensClip)">

    <!-- Document lines — top zone -->
    <g stroke="#1e3a5f" stroke-width="2" stroke-linecap="round">
      <line x1="55"  y1="42" x2="155" y2="42"/>
      <line x1="55"  y1="52" x2="140" y2="52"/>
      <line x1="55"  y1="62" x2="150" y2="62"/>
    </g>

    <!-- Document lines — bottom zone -->
    <g stroke="#1e3a5f" stroke-width="2" stroke-linecap="round">
      <line x1="55"  y1="134" x2="155" y2="134"/>
      <line x1="55"  y1="144" x2="138" y2="144"/>
      <line x1="55"  y1="154" x2="148" y2="154"/>
    </g>

    <!-- Neural network connections (2-3-2 layers) -->
    <g stroke="url(#grad)" stroke-opacity="0.38" stroke-width="1.2">
      <!-- Layer 1 → Layer 2 -->
      <line x1="72" y1="84"  x2="105" y2="74"/>
      <line x1="72" y1="84"  x2="105" y2="98"/>
      <line x1="72" y1="84"  x2="105" y2="122"/>
      <line x1="72" y1="112" x2="105" y2="74"/>
      <line x1="72" y1="112" x2="105" y2="98"/>
      <line x1="72" y1="112" x2="105" y2="122"/>
      <!-- Layer 2 → Layer 3 -->
      <line x1="105" y1="74"  x2="138" y2="84"/>
      <line x1="105" y1="74"  x2="138" y2="112"/>
      <line x1="105" y1="98"  x2="138" y2="84"/>
      <line x1="105" y1="98"  x2="138" y2="112"/>
      <line x1="105" y1="122" x2="138" y2="84"/>
      <line x1="105" y1="122" x2="138" y2="112"/>
    </g>

    <!-- Node glow halos -->
    <g fill-opacity="0.18">
      <circle cx="72"  cy="84"  r="11" fill="#3B82F6"/>
      <circle cx="72"  cy="112" r="11" fill="#3B82F6"/>
      <circle cx="105" cy="74"  r="11" fill="#3B82F6"/>
      <circle cx="105" cy="98"  r="13" fill="#1d8cf0"/>
      <circle cx="105" cy="122" r="11" fill="#06B6D4"/>
      <circle cx="138" cy="84"  r="11" fill="#06B6D4"/>
      <circle cx="138" cy="112" r="11" fill="#06B6D4"/>
    </g>

    <!-- Node cores -->
    <g fill="url(#grad)">
      <circle cx="72"  cy="84"  r="4.5"/>
      <circle cx="72"  cy="112" r="4.5"/>
      <circle cx="105" cy="74"  r="4.5"/>
      <circle cx="105" cy="98"  r="5.5"/>
      <circle cx="105" cy="122" r="4.5"/>
      <circle cx="138" cy="84"  r="4.5"/>
      <circle cx="138" cy="112" r="4.5"/>
    </g>

  </g>

  <!-- Lens outer ring -->
  <circle cx="105" cy="98" r="70" stroke="url(#grad)" stroke-width="8"/>

  <!-- Subtle highlight arc (upper-left rim) -->
  <path d="M 47 74 A 70 70 0 0 1 120 30"
        stroke="white" stroke-opacity="0.12" stroke-width="2.5" stroke-linecap="round"/>
</svg>
